
<div class="container mt-5">
<section class="services-section">
  <div class="container">

    <span class="badge">Our Services</span>

    <h2>Our Digital Services</h2>

    <p class="subtitle">
      We provide modern technology and marketing solutions that help
      businesses improve their online presence, connect with customers,
      and grow efficiently.
    </p>

    <div class="services-grid">

      <div class="service-card" *ngFor="let service of services"
           [ngClass]="{'dark-card': service.dark}">

        <div class="card-header">
          <h3>{{service.title}}</h3>
          <i class="fas fa-arrow-up-right-from-square"></i>
        </div>

        <p>{{service.desc}}</p>

        <img [src]="service.image" [alt]="service.title">

      </div>

    </div>

  </div>
</section></div>
